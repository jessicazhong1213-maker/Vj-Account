<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VJ Agency Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');
:root{--paper:#F7F4EE;--paper2:#fff;--ink:#1B2A4A;--ink2:#3a4663;--muted:#8a90a0;--line:#E6E1D6;--green:#0E7C7B;--amber:#C8941E;--red:#A14034;--sans:'Manrope',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
.loading{padding:80px;text-align:center;color:var(--muted);font-size:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;background:var(--ink);color:#fff;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;background:var(--amber);color:var(--ink);display:grid;place-items:center;font-size:15px;font-weight:700;flex-shrink:0}
.brand h1{font-size:17px;font-weight:600;margin-bottom:2px}
.brand p{font-size:11px;opacity:.6;letter-spacing:1.5px}
.yr{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.85}
.yr select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:5px 9px;font-family:var(--sans)}
.tabs{display:flex;gap:3px;padding:8px 16px 0;background:var(--ink);overflow-x:auto}
.tab{display:flex;align-items:center;gap:5px;padding:9px 13px;border:none;background:transparent;color:rgba(255,255,255,.6);border-radius:9px 9px 0 0;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;white-space:nowrap}
.tab:hover{color:#fff}.tab.on{background:var(--paper);color:var(--ink);font-weight:600}
.content{padding:20px;max-width:1100px;margin:0 auto}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:16px}
.card.no-pad{padding:0;overflow:hidden}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.empty{color:var(--muted);text-align:center;padding:20px;font-size:13px}
.dim{color:var(--muted)}.sm{font-size:12px}
.link{background:none;border:none;color:var(--green);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gap{gap:10px}.span2{grid-column:1/-1}
@media(max-width:700px){.grid4{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
.kpi{background:var(--paper2);border:1px solid var(--line);border-left:4px solid var(--ac,#1B2A4A);border-radius:13px;padding:14px}
.kpi-t{font-size:11px;color:var(--muted)}
.kpi-m{font-size:22px;font-weight:700;margin:4px 0 2px;font-variant-numeric:tabular-nums}
.kpi-s{font-size:11px;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 13px;border-bottom:1px solid var(--line);font-weight:600}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.rf{background:#A140340a}
.tbl .num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tbl .pos{color:var(--green);font-weight:600}.tbl .neg{color:var(--red);font-weight:600}
.tbl.mini td,.tbl.mini th{padding:7px 5px;font-size:12px}
.act{text-align:right;white-space:nowrap}
.code{font-weight:600;color:var(--ink);background:var(--amber)22;padding:2px 7px;border-radius:5px;font-size:12px}

/* 待办事项 - 关键修复 */
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);gap:8px}
.row:last-child{border-bottom:none}
.row-main{flex:1;min-width:0;overflow:hidden}
.row-main label{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.row-main label input[type=checkbox]{flex-shrink:0;margin-top:2px}
.row-main label span{word-break:break-all;overflow-wrap:anywhere;white-space:normal;line-height:1.4;color:var(--ink)}
.row-side{flex-shrink:0;display:flex;align-items:center;gap:6px}
.row-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.amt{font-weight:600;font-variant-numeric:tabular-nums}

/* 新增待办输入框 */
.qtask{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.qtask input[placeholder]{flex:1;min-width:120px}
.qtask input[type=date]{width:140px;flex-shrink:0}

.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:8px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--ink2)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:var(--ink2)}
.btn.ghost{background:transparent;border-style:dashed}
.btn.danger{color:var(--red);border-color:var(--red)44}
.btn.sm{padding:5px 9px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-col{display:flex;flex-direction:column;gap:8px}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:14px;flex-shrink:0}
.icon-btn:hover{background:var(--line);color:var(--ink)}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.srch{display:flex;align-items:center;gap:7px;background:var(--paper2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;min-width:200px;color:var(--muted);flex:1}
.srch input{border:none;background:none;outline:none;font-family:var(--sans);font-size:13px;width:100%;color:var(--ink)}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fld-l{font-size:12px;color:var(--ink2);font-weight:600}
input,select,textarea{font-family:var(--sans);font-size:13px;border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:var(--paper2);color:var(--ink);outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ink2)}
.ta{width:100%;min-height:110px;resize:vertical;margin-bottom:10px}
.seg{display:flex;gap:3px;background:var(--line);padding:3px;border-radius:9px;margin-bottom:12px}
.seg button{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.on{background:var(--paper2);color:var(--ink);box-shadow:0 1px 3px #0001}
.ov{position:fixed;inset:0;background:#1B2A4A66;backdrop-filter:blur(3px);display:grid;place-items:center;padding:16px;z-index:50}
.modal{background:var(--paper);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow:auto;border:1px solid var(--line)}
.modal.wide{max-width:700px}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper)}
.modal-h h3{font-size:15px;font-weight:600}
.modal-b{padding:18px}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.match{display:flex;align-items:center;gap:8px;border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:13px}
.match.ok{background:#0E7C7B16;border:1px solid #0E7C7B55;color:#0a5b5a}
.match.no{background:#C8941E18;border:1px solid #C8941E66;color:#7a5b12}
.advice p{margin-bottom:4px;font-size:13px;line-height:1.7}
.comm-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.comm-row:last-child{border-bottom:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 8px 24px #1b2a4a44;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.info-box{background:#0E7C7B18;border:1px solid #0E7C7B55;border-radius:10px;padding:12px 14px;font-size:12px;color:#0a5b5a;margin-bottom:14px}
.login-wrap{display:grid;place-items:center;min-height:100vh;background:var(--ink)}
.login-box{text-align:center;color:#fff;padding:40px;max-width:400px}
.logo-big{width:64px;height:64px;border-radius:16px;background:var(--amber);color:var(--ink);display:grid;place-items:center;font-size:26px;font-weight:700;margin:0 auto 20px}
.login-box h1{font-size:22px;font-weight:600;margin-bottom:8px}
.login-box p{opacity:.7;margin-bottom:28px;line-height:1.6}
.user-info{font-size:12px;color:rgba(255,255,255,.7)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:var(--sans)}
</style>
</head>
<body>
<div id="app"><div class="loading">载入中…</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCL3lP6QmmOAYUS66VUbo5YnWl_xBBivts",
  authDomain: "vj-account.firebaseapp.com",
  projectId: "vj-account",
  storageBucket: "vj-account.firebasestorage.app",
  messagingSenderId: "274705581918",
  appId: "1:274705581918:web:7e308a2e1a7fe368e5f1cf",
};
const ANTHROPIC_KEY_LS = "vj_anthropic_key";
let ANTHROPIC_KEY = localStorage.getItem(ANTHROPIC_KEY_LS) || "";
const ANTHROPIC_MODEL = "claude-sonnet-4-6";

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const CCY = { AUD:{label:"澳币",symbol:"A$"}, CNY:{label:"人民币",symbol:"¥"} };
const DEFAULT_CLIENT_TYPES = ["签证","学校","职评","雇主","猎头","上诉","咨询","其他"];
const EXPENSE_CATS = ["办公租金","工资薪酬","推荐人返佣","营销推广","政府/申请费","差旅","软件订阅","专业服务","其他"];
const INCOME_TYPES = ["服务费","佣金","其他"];
const DEFAULT_SERVICE_SEED = ["签证申请","学校申请","职业评估","雇主担保","猎头服务","上诉/复审","咨询服务","482 SBS","482 NOM","482 VISA","189 独立技术","190 州担保","PR 永居","学生签 500","配偶签 820/801","其他"];
const COURSE_LEVELS = ["Higher Education","VET","ELICOS","Foundation","School","Other"];
const COMM_STATUS = {
  awaiting_tuition:{label:"待付学费",color:"#8a90a0"},
  claimable:{label:"可申请",color:"#C8941E"},
  claimed:{label:"已申请",color:"#1B2A4A"},
  received:{label:"已收到",color:"#0E7C7B"},
  refunded:{label:"已退款",color:"#A14034"},
};
const DEFAULT_DATA = {
  clients:[], transactions:[], offers:[], tasks:[],
  settings:{prefix:"C",nextSeq:1,clientTypes:DEFAULT_CLIENT_TYPES,serviceSeed:DEFAULT_SERVICE_SEED}
};

const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today = ()=>new Date().toISOString().slice(0,10);
const addMonths = (s,n)=>{if(!s)return null;const d=new Date(s);if(isNaN(d))return null;d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);};
const fmt = (amt,ccy)=>{const s=(CCY[ccy]||{}).symbol||"";return s+Number(amt||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});};
const esc = s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let state = {user:null, data:JSON.parse(JSON.stringify(DEFAULT_DATA)), tab:"dash", year:new Date().getFullYear(), loading:true};

async function loadData(uid){
  try{const snap=await getDoc(doc(db,"users",uid,"data","main"));if(snap.exists())return{...DEFAULT_DATA,...snap.data(),settings:{...DEFAULT_DATA.settings,...(snap.data().settings||{})}};}catch(e){console.error(e);}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
async function saveData(uid,data){
  try{await setDoc(doc(db,"users",uid,"data","main"),data);}catch(e){console.error(e);}
}
function update(mut){
  if(typeof mut==="function") state.data=mut(JSON.parse(JSON.stringify(state.data)));
  else state.data=mut;
  if(state.user) saveData(state.user.uid,state.data);
  render();
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="toast show";
  clearTimeout(t._t);t._t=setTimeout(()=>t.className="toast",2600);
}
function confirm2(msg){
  return new Promise(res=>{
    const ov=document.createElement("div");ov.className="ov";
    ov.innerHTML=`<div class="modal" style="max-width:400px"><div class="modal-h"><h3>确认操作</h3></div><div class="modal-b"><p style="font-size:14px;line-height:1.6">${esc(msg)}</p><div class="modal-f"><button class="btn" id="cno">取消</button><button class="btn danger" id="cyes">确定</button></div></div></div>`;
    document.body.appendChild(ov);
    ov.querySelector("#cno").onclick=()=>{ov.remove();res(false);};
    ov.querySelector("#cyes").onclick=()=>{ov.remove();res(true);};
  });
}

async function callAI(messages,maxTokens=1000){
  if(!ANTHROPIC_KEY){toast("请先在「设置」里填入 Anthropic API Key");throw new Error("No API Key");}
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:maxTokens,messages})
  });
  const j=await res.json();
  if(j.error)throw new Error(j.error.message);
  return(j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

function inYear(d,y){if(y==="all")return true;if(!d)return false;return new Date(d).getFullYear()===Number(y);}
function totalsByCcy(txs,y){
  const r={AUD:{income:0,expense:0},CNY:{income:0,expense:0}};
  txs.forEach(t=>{if(!inYear(t.date,y))return;const c=r[t.currency]||r.AUD;if(t.kind==="income")c.income+=Number(t.amount);else c.expense+=Number(t.amount);});
  return r;
}
function clientName(id){const c=state.data.clients.find(c=>c.id===id);return c?`${c.name}（${c.code}）`:"—";}
function buildCommissions(p){
  const ccy=p.currency||"AUD";const rate=Number(p.commissionRate)||0;const out=[];
  const sched=Array.isArray(p.paymentSchedule)?p.paymentSchedule.filter(s=>s&&Number(s.amount)):[];
  if(sched.length>0)sched.forEach((s,i)=>{const b=Number(s.amount)||0;out.push({id:uid(),label:s.label||`第${i+1}期学费`,basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:s.dueDate||null,status:"awaiting_tuition",note:s.note||""});});
  else if((p.courseLevel||"").toLowerCase().includes("higher")){const b=Number(p.tuitionTotal)||0;out.push({id:uid(),label:"全额学费佣金",basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:addMonths(p.intakeStartDate,3),status:"awaiting_tuition",note:"Higher Education 默认开学后3个月可申请"});}
  else{const b=Number(p.tuitionTotal)||0;out.push({id:uid(),label:"学费佣金（待确认）",basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:null,status:"awaiting_tuition",note:"时间不确定，需clarify"});}
  return out;
}
function getYears(){
  const s=new Set([new Date().getFullYear()]);
  state.data.transactions.forEach(t=>s.add(new Date(t.date).getFullYear()));
  return Array.from(s).sort((a,b)=>b-a);
}

function render(){
  const app=document.getElementById("app");if(!app)return;
  if(state.loading){app.innerHTML=`<div class="loading">载入中…</div>`;return;}
  if(!state.user){app.innerHTML=renderLogin();bindLogin();return;}
  app.innerHTML=renderShell();
  bindShell();
}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-box">
  <div class="logo-big">VJ</div>
  <h1>VJ Consulting & Education</h1>
  <p>客户 · 记账 · 佣金 · 分析<br>数据存储在你的 Google 账号，多设备同步</p>
  <button class="btn primary" style="padding:12px 28px;font-size:15px" id="btn-login">🔐 用 Google 账号登录</button>
  </div></div>`;
}
function bindLogin(){
  document.getElementById("btn-login").onclick=async()=>{
    try{await signInWithPopup(auth,provider);}catch(e){toast("登录失败："+e.message);}
  };
}

function renderShell(){
  const tabs=[["dash","📊 仪表盘"],["clients","👥 客户"],["ledger","📒 记账"],["comm","🎓 Offer/佣金"],["analytics","📈 分析"],["settings","⚙️ 设置"]];
  return`
<header class="topbar">
  <div class="brand"><span class="logo">VJ</span><div><h1>VJ Consulting & Education</h1><p>客户 · 记账 · 佣金 · 退款</p></div></div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div class="yr"><span>年度</span><select id="sel-year">${["all",...getYears()].map(y=>`<option value="${y}"${state.year==y?" selected":""}>${y==="all"?"全部":y+" 年"}</option>`).join("")}</select></div>
    <span class="user-info">${esc(state.user.displayName||state.user.email)}</span>
    <button class="btn-logout" id="btn-logout">退出</button>
  </div>
</header>
<nav class="tabs">${tabs.map(([id,label])=>`<button class="tab${state.tab===id?" on":""}" data-tab="${id}">${label}</button>`).join("")}</nav>
<main class="content" id="main-content">${renderTab()}</main>`;
}

function renderTab(){
  switch(state.tab){
    case"dash":return renderDash();
    case"clients":return renderClients();
    case"ledger":return renderLedger();
    case"comm":return renderComm();
    case"analytics":return renderAnalytics();
    case"settings":return renderSettings();
    default:return"";
  }
}

function renderDash(){
  const t=totalsByCcy(state.data.transactions,state.year);
  const allComms=state.data.offers.flatMap(o=>(o.commissions||[]).map(c=>({...c,offer:o})));
  const dueComms=allComms.filter(c=>c.status==="claimable"||(c.status==="awaiting_tuition"&&c.claimableDate&&c.claimableDate<=addMonths(today(),1))).sort((a,b)=>(a.claimableDate||"").localeCompare(b.claimableDate||""));
  const openTasks=(state.data.tasks||[]).filter(x=>!x.done).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  return`
<div class="grid4">
  <div class="kpi" style="--ac:#1B2A4A"><p class="kpi-t">澳币净收入</p><p class="kpi-m">${fmt(t.AUD.income-t.AUD.expense,"AUD")}</p><p class="kpi-s">收${fmt(t.AUD.income,"AUD")} · 支${fmt(t.AUD.expense,"AUD")}</p></div>
  <div class="kpi" style="--ac:#0E7C7B"><p class="kpi-t">人民币净收入</p><p class="kpi-m">${fmt(t.CNY.income-t.CNY.expense,"CNY")}</p><p class="kpi-s">收${fmt(t.CNY.income,"CNY")} · 支${fmt(t.CNY.expense,"CNY")}</p></div>
  <div class="kpi" style="--ac:#C8941E"><p class="kpi-t">客户总数</p><p class="kpi-m">${state.data.clients.length}</p><p class="kpi-s">Offer ${state.data.offers.length} 份</p></div>
  <div class="kpi" style="--ac:#A14034"><p class="kpi-t">待claim佣金</p><p class="kpi-m">${dueComms.length}</p><p class="kpi-s">点下方提醒处理</p></div>
</div>
<div class="grid2">
  <section class="card">
    <div class="card-h"><h2>🔔 佣金提醒</h2><button class="link" onclick="setTab('comm')">全部 →</button></div>
    ${dueComms.length===0?`<p class="empty">暂无需要处理的佣金</p>`:dueComms.map(c=>`
    <div class="row">

function renderTaskList(){
  const container=document.getElementById("task-list");
  if(!container)return;
  container.innerHTML="";
  const openTasks=(state.data.tasks||[]).filter(x=>!x.done).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  if(openTasks.length===0)return;
  openTasks.forEach(x=>{
    const row=document.createElement("div");row.className="row";
    const main=document.createElement("div");main.className="row-main";
    const label=document.createElement("label");
    const cb=document.createElement("input");cb.type="checkbox";cb.onchange=()=>doneTask(x.id);
    const span=document.createElement("span");span.textContent=x.title;
    label.appendChild(cb);label.appendChild(span);
    main.appendChild(label);
    if(x.dueDate){const p=document.createElement("p");p.className="dim sm";p.style.marginTop="4px";p.style.marginLeft="20px";p.textContent="截止 "+x.dueDate;main.appendChild(p);}
    const side=document.createElement("div");side.className="row-side";
    const btn=document.createElement("button");btn.className="icon-btn";btn.textContent="🗑";btn.onclick=()=>delTask(x.id);
    side.appendChild(btn);
    row.appendChild(main);row.appendChild(side);
    container.appendChild(row);
  });
}

};
window.closeTxForm=()=>{const a=document.getElementById("tx-form-area");if(a)a.innerHTML="";};
window.setTxKind=k=>{
  window._txKind=k;
  const f=document.getElementById("tx-type-field");if(!f)return;
  if(k==="income")f.innerHTML=`<span class="fld-l">收入类型</span><select id="tx-itype">${INCOME_TYPES.map(x=>`<option>${x}</option>`).join("")}</select>`;
  else f.innerHTML=`<span class="fld-l">支出分类</span><select id="tx-cat">${EXPENSE_CATS.map(x=>`<option>${x}</option>`).join("")}</select>`;
  document.querySelectorAll(".seg button").forEach((b,i)=>b.className=((k==="income"&&i===0)||(k==="expense"&&i===1))?"on":"");
};
window.saveTx=id=>{
  const kind=window._txKind||"income";
  const amt=Number(document.getElementById("tx-amt")?.value);if(!amt){toast("金额不能为空");return;}
  const t={id:id||uid(),kind,incomeType:kind==="income"?(document.getElementById("tx-itype")?.value||"服务费"):null,category:kind==="expense"?(document.getElementById("tx-cat")?.value||EXPENSE_CATS[0]):null,currency:document.getElementById("tx-ccy")?.value||"AUD",amount:amt,date:document.getElementById("tx-date")?.value||today(),clientId:document.getElementById("tx-client")?.value||"",note:document.getElementById("tx-note")?.value||""};
  update(d=>{if(id){const i=d.transactions.findIndex(x=>x.id===id);if(i>=0)d.transactions[i]=t;}else d.transactions.push(t);return d;});
  delete window._txKind;
};
window.delTx=async id=>{if(await confirm2("删除该笔记录？"))update(d=>{d.transactions=d.transactions.filter(x=>x.id!==id);return d;});};

window.parseOffer=async()=>{
  const text=document.getElementById("offer-text")?.value?.trim();if(!text){toast("请先粘贴Offer内容");return;}
  toast("AI识别中…");
  const roster=state.data.clients.map(c=>`${c.code}=${c.name}`).join("；")||"（暂无客户）";
  const sys=`你是澳洲留学Offer解析助手。只输出JSON，不要任何解释或代码块。字段：{"studentName":string|null,"matchedClientCode":string|null,"institution":string|null,"course":string|null,"courseLevel":"Higher Education"|"VET"|"ELICOS"|"Foundation"|"School"|"Other","currency":"AUD"|"CNY","tuitionTotal":number|null,"intakeStartDate":"YYYY-MM-DD"|null,"paymentSchedule":[{"label":string,"amount":number,"dueDate":"YYYY-MM-DD"|null,"note":string}],"commissionRate":number|null,"needsClarification":boolean,"clarificationQuestions":[string]}\n客户名单：${roster}`;
  try{
    let txt=await callAI([{role:"user",content:`${sys}\n\nOffer内容：\n${text}`}],1200);
    txt=txt.replace(/```json|```/g,"").trim();
    const p=JSON.parse(txt);let matched=null;
    if(p.matchedClientCode)matched=state.data.clients.find(c=>c.code===p.matchedClientCode);
    if(!matched&&p.studentName){const n=p.studentName.replace(/\s/g,"");matched=state.data.clients.find(c=>c.name&&(c.name.includes(n)||n.includes(c.name)));}
    openOfferForm(null,{...p,id:null,clientId:matched?matched.id:"",currency:p.currency==="CNY"?"CNY":"AUD",commissions:buildCommissions(p)});
  }catch(e){toast("识别失败："+e.message);}
};
window.openOfferJSON=()=>{
  const area=document.getElementById("offer-form-area");if(!area)return;
  area.innerHTML=`<div class="ov" onclick="if(event.target===this)closeOfferForm()"><div class="modal" onclick="event.stopPropagation()">
  <div class="modal-h"><h3>📋 粘贴 JSON 导入 Offer</h3><button class="icon-btn" onclick="closeOfferForm()">✕</button></div>
  <div class="modal-b">
    <p class="dim sm" style="margin-bottom:10px">把 Claude 给你的 Offer JSON 粘贴到下面，点「导入」自动填好所有字段。</p>
    <textarea id="offer-json-input" class="ta" style="min-height:200px;font-family:monospace;font-size:12px" placeholder='{"clientId":"C-0001","institution":"AIA","course":"Master of Business Analytics",...}'></textarea>
    <div class="modal-f"><button class="btn" onclick="closeOfferForm()">取消</button><button class="btn primary" onclick="importOfferJSON()">导入</button></div>
  </div></div></div>`;
};
window.importOfferJSON=()=>{
  const txt=document.getElementById("offer-json-input")?.value?.trim();
  if(!txt){toast("请先粘贴JSON");return;}
  try{
    const p=JSON.parse(txt);
    // 匹配客户
    let clientId=p.clientId||"";
    if(!clientId&&p.studentName){
      const n=p.studentName.replace(/\s/g,"");
      const matched=state.data.clients.find(c=>c.name&&(c.name.includes(n)||n.includes(c.name)));
      if(matched)clientId=matched.id;
    }
    const draft={
      id:null,clientId,
      studentName:p.studentName||"",
      institution:p.institution||"",
      course:p.course||"",
      courseLevel:p.courseLevel||"Higher Education",
      currency:p.currency||"AUD",
      tuitionTotal:Number(p.tuitionTotal)||0,
      intakeStartDate:p.intakeStartDate||"",
      commissionRate:Number(p.commissionRate)||0,
      commissions:p.commissions||buildCommissions(p),
      paymentSchedule:p.paymentSchedule||[],
    };
    closeOfferForm();
    openOfferForm(null,draft);
  }catch(e){toast("JSON格式错误："+e.message);}
};
  const o=id?state.data.offers.find(x=>x.id===id):(draft||{id:null,clientId:"",studentName:"",institution:"",course:"",courseLevel:"Higher Education",currency:"AUD",tuitionTotal:"",intakeStartDate:"",commissionRate:"",commissions:[]});
  const area=document.getElementById("offer-form-area");if(!area)return;
  window._offerComms=o.commissions||[];
  area.innerHTML=`<div class="ov" onclick="if(event.target===this)closeOfferForm()"><div class="modal wide" onclick="event.stopPropagation()">
  <div class="modal-h"><h3>${id?"编辑Offer":"确认Offer信息"}</h3><button class="icon-btn" onclick="closeOfferForm()">✕</button></div>
  <div class="modal-b">
    ${!id&&o.clientId?`<div class="match ok">✅ 已自动匹配：<strong>${esc(clientName(o.clientId))}</strong></div>`:!id?`<div class="match no">⚠️ ${o.studentName?"未匹配到「"+esc(o.studentName)+"」":"未读到学生姓名"}，请手动选择</div>`:""}
    <div class="grid2 gap">
      <div class="fld"><span class="fld-l">客户</span><select id="of-client"><option value="">未关联</option>${state.data.clients.map(c=>`<option value="${c.id}"${o.clientId===c.id?" selected":""}>${esc(c.name)}（${esc(c.code)}）</option>`).join("")}</select></div>
      <div class="fld"><span class="fld-l">学生姓名</span><input id="of-sname" value="${esc(o.studentName||"")}"/></div>
      <div class="fld"><span class="fld-l">院校</span><input id="of-inst" value="${esc(o.institution||"")}"/></div>
      <div class="fld"><span class="fld-l">课程</span><input id="of-course" value="${esc(o.course||"")}"/></div>
      <div class="fld"><span class="fld-l">课程层次</span><select id="of-level">${COURSE_LEVELS.map(x=>`<option${o.courseLevel===x?" selected":""}>${x}</option>`).join("")}</select></div>
      <div class="fld"><span class="fld-l">币种</span><select id="of-ccy">${Object.keys(CCY).map(k=>`<option value="${k}"${o.currency===k?" selected":""}>${CCY[k].label}</option>`).join("")}</select></div>
      <div class="fld"><span class="fld-l">学费总额</span><input type="number" id="of-tuition" value="${o.tuitionTotal||""}"/></div>
      <div class="fld"><span class="fld-l">开学日期</span><input type="date" id="of-intake" value="${o.intakeStartDate||""}"/></div>
      <div class="fld"><span class="fld-l">佣金比例%</span><input type="number" id="of-rate" value="${o.commissionRate||""}"/></div>
    </div>
    <div class="modal-f"><button class="btn" onclick="closeOfferForm()">取消</button><button class="btn primary" onclick="saveOffer('${id||""}')">保存Offer</button></div>
  </div></div></div>`;
};
window.closeOfferForm=()=>{const a=document.getElementById("offer-form-area");if(a)a.innerHTML="";};
window.saveOffer=id=>{
  const o={id:id||uid(),clientId:document.getElementById("of-client")?.value||"",studentName:document.getElementById("of-sname")?.value||"",institution:document.getElementById("of-inst")?.value||"",course:document.getElementById("of-course")?.value||"",courseLevel:document.getElementById("of-level")?.value||"Other",currency:document.getElementById("of-ccy")?.value||"AUD",tuitionTotal:Number(document.getElementById("of-tuition")?.value)||0,intakeStartDate:document.getElementById("of-intake")?.value||"",commissionRate:Number(document.getElementById("of-rate")?.value)||0,createdAt:today()};
  o.commissions=window._offerComms?.length?window._offerComms:buildCommissions(o);
  update(d=>{if(id){const i=d.offers.findIndex(x=>x.id===id);if(i>=0)d.offers[i]=o;}else d.offers.push(o);return d;});
  delete window._offerComms;
};
window.delOffer=async id=>{if(await confirm2("删除该Offer及佣金记录？"))update(d=>{d.offers=d.offers.filter(x=>x.id!==id);return d;});};
window.moveComm=async(oid,cid,action)=>{
  if(action==="refund"&&!(await confirm2("确认将这笔佣金标记为退款？")))return;
  update(d=>{
    const o=d.offers.find(x=>x.id===oid);const c=o?.commissions?.find(x=>x.id===cid);if(!c)return d;
    if(action==="paid"){c.tuitionPaid=true;c.status="claimable";if(!c.claimableDate)c.claimableDate=today();}
    if(action==="claimed")c.status="claimed";
    if(action==="received"){c.status="received";d.transactions.push({id:uid(),clientId:o.clientId,kind:"income",incomeType:"佣金",currency:c.currency,amount:c.commissionAmount,date:today(),note:`佣金·${o.institution}·${c.label}`});}
    if(action==="refund"){const was=c.status==="received";c.status="refunded";if(was)d.transactions.push({id:uid(),clientId:o.clientId,kind:"expense",category:"退款",currency:c.currency,amount:c.commissionAmount,date:today(),note:`佣金退款·${o.institution}·${c.label}`,isRefund:true});}
    return d;
  });
};
window.exportJSON=()=>{const text=JSON.stringify(state.data,null,2);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type:"application/json"}));a.download=`VJ台账备份_${today()}.json`;a.click();toast("已导出JSON");};
window.exportCSV=()=>{const rows=[["日期","类型","客户","明细","币种","金额"]];state.data.transactions.forEach(t=>{const c=state.data.clients.find(c=>c.id===t.clientId);rows.push([t.date,t.kind==="income"?(t.incomeType||"收入"):(t.category||"支出"),c?c.name:"",(t.note||"").replace(/,/g," "),t.currency,(t.kind==="income"?"":"-")+t.amount]);});const csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`记账明细_${today()}.csv`;a.click();toast("已导出CSV");};
window.importJSON=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);update({...DEFAULT_DATA,...d});toast("导入成功！");}catch{toast("文件格式错误");}};r.readAsText(f);};
window.clearAll=async()=>{if(await confirm2("确定清空所有数据？此操作不可恢复！"))update(JSON.parse(JSON.stringify(DEFAULT_DATA)));};
window.saveApiKey=()=>{const k=document.getElementById("api-key-input")?.value?.trim();if(k){localStorage.setItem(ANTHROPIC_KEY_LS,k);ANTHROPIC_KEY=k;toast("API Key已保存");}};

onAuthStateChanged(auth,async user=>{
  state.user=user;
  if(user){state.loading=true;render();state.data=await loadData(user.uid);state.loading=false;}
  else{state.loading=false;}
  render();
});
</script>
</body>
</html>
