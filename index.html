<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VJ Agency Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');
:root{--paper:#F7F4EE;--paper2:#fff;--ink:#1B2A4A;--ink2:#3a4663;--muted:#8a90a0;--line:#E6E1D6;--green:#0E7C7B;--amber:#C8941E;--red:#A14034;--sans:'Manrope',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.45;min-height:100vh}
.loading{padding:80px;text-align:center;color:var(--muted);font-size:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--ink);color:#fff;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:9px;background:var(--amber);color:var(--ink);display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0}
.brand h1{font-size:16px;font-weight:600}
.brand p{font-size:10px;opacity:.6;letter-spacing:1.5px}
.yr select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:4px 8px;font-family:var(--sans);font-size:12px}
.tabs{display:flex;gap:2px;padding:6px 12px 0;background:var(--ink);overflow-x:auto}
.tab{display:flex;align-items:center;gap:4px;padding:8px 12px;border:none;background:transparent;color:rgba(255,255,255,.6);border-radius:8px 8px 0 0;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;white-space:nowrap}
.tab:hover{color:#fff}.tab.on{background:var(--paper);color:var(--ink);font-weight:600}
.content{padding:16px;max-width:1100px;margin:0 auto}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:14px}
.card.no-pad{padding:0;overflow:hidden}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.empty{color:var(--muted);text-align:center;padding:16px;font-size:13px}
.dim{color:var(--muted)}.sm{font-size:12px}.xs{font-size:11px}
.link{background:none;border:none;color:var(--green);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gap{gap:8px}.span2{grid-column:1/-1}.span3{grid-column:1/-1}
@media(max-width:700px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
@media(max-width:400px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr}}

/* KPI */
.kpi{background:var(--paper2);border:1px solid var(--line);border-left:4px solid var(--ac,#1B2A4A);border-radius:13px;padding:12px}
.kpi-t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-m{font-size:20px;font-weight:700;margin:3px 0 1px;font-variant-numeric:tabular-nums;line-height:1.2}
.kpi-s{font-size:10px;color:var(--muted)}
.kpi-trend{font-size:11px;font-weight:600;margin-top:2px}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}.trend-flat{color:var(--muted)}

/* 月度对比迷你图 */
.mini-bars{display:flex;align-items:flex-end;gap:3px;height:36px;margin-top:8px}
.mini-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s}
.mini-bar.cur{opacity:1}.mini-bar.prev{opacity:.4}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.rf{background:#A140340a}
.tbl .num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tbl .pos{color:var(--green);font-weight:600}.tbl .neg{color:var(--red);font-weight:600}
.tbl.mini td,.tbl.mini th{padding:7px 10px;font-size:12px}
.act{text-align:right;white-space:nowrap}
.code{font-weight:600;color:var(--ink);background:var(--amber)22;padding:2px 6px;border-radius:4px;font-size:11px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px}
.row:last-child{border-bottom:none}
.row-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.amt{font-weight:600;font-variant-numeric:tabular-nums}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--ink2)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.ghost{background:transparent;border-style:dashed}
.btn.danger{color:var(--red);border-color:var(--red)44}
.btn.sm{padding:4px 8px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-col{display:flex;flex-direction:column;gap:8px}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;font-size:14px}
.icon-btn:hover{background:var(--line);color:var(--ink)}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.srch{display:flex;align-items:center;gap:7px;background:var(--paper2);border:1px solid var(--line);border-radius:8px;padding:7px 11px;flex:1;min-width:180px;color:var(--muted)}
.srch input{border:none;background:none;outline:none;font-family:var(--sans);font-size:13px;width:100%;color:var(--ink)}
.fld{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.fld-l{font-size:12px;color:var(--ink2);font-weight:600}
input,select,textarea{font-family:var(--sans);font-size:13px;border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:var(--paper2);color:var(--ink);outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--ink2)}
.ta{width:100%;min-height:100px;resize:vertical;margin-bottom:10px}
.seg{display:flex;gap:3px;background:var(--line);padding:3px;border-radius:9px;margin-bottom:12px}
.seg button{flex:1;padding:6px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--ink2)}
.seg button.on{background:var(--paper2);color:var(--ink);box-shadow:0 1px 3px #0001}
.ov{position:fixed;inset:0;background:#1B2A4A66;backdrop-filter:blur(3px);display:grid;place-items:center;padding:16px;z-index:50}
.modal{background:var(--paper);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow:auto;border:1px solid var(--line)}
.modal.wide{max-width:700px}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper)}
.modal-h h3{font-size:15px;font-weight:600}
.modal-b{padding:16px}
.modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.match{display:flex;align-items:center;gap:8px;border-radius:9px;padding:9px 12px;margin-bottom:10px;font-size:13px}
.match.ok{background:#0E7C7B16;border:1px solid #0E7C7B55;color:#0a5b5a}
.match.no{background:#C8941E18;border:1px solid #C8941E66;color:#7a5b12}
.comm-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.comm-row:last-child{border-bottom:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 8px 24px #1b2a4a44;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.info-box{background:#0E7C7B18;border:1px solid #0E7C7B55;border-radius:10px;padding:10px 12px;font-size:12px;color:#0a5b5a;margin-bottom:12px}
.warn-box{background:#C8941E18;border:1px solid #C8941E55;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5b12;margin-bottom:12px}
.login-wrap{display:grid;place-items:center;min-height:100vh;background:var(--ink)}
.login-box{text-align:center;color:#fff;padding:40px;max-width:400px}
.logo-big{width:64px;height:64px;border-radius:16px;background:var(--amber);color:var(--ink);display:grid;place-items:center;font-size:26px;font-weight:700;margin:0 auto 20px}
.user-info{font-size:12px;color:rgba(255,255,255,.7)}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:var(--sans)}
/* 标签输入 */
.tags-input{display:flex;flex-wrap:wrap;gap:5px;border:1px solid var(--line);border-radius:7px;padding:5px 8px;background:var(--paper2);min-height:38px;cursor:text}
.tags-input:focus-within{border-color:var(--ink2)}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--ink);color:#fff;border-radius:4px;padding:2px 7px;font-size:11px}
.tag button{background:none;border:none;color:#fff;cursor:pointer;font-size:13px;line-height:1;padding:0}
.tags-input input{border:none;outline:none;background:none;font-size:12px;flex:1;min-width:80px;padding:2px}
/* 分析横条图 */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-item{display:grid;grid-template-columns:120px 1fr 90px;align-items:center;gap:8px}
.bar-label{font-size:11px;font-weight:600;color:var(--ink2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{background:var(--line);border-radius:20px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .4s}
.bar-val{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
@media(max-width:520px){.bar-item{grid-template-columns:80px 1fr 70px}}
/* 收款提醒 */
.unpaid-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px}
.unpaid-row:last-child{border-bottom:none}
.urgency-high{color:var(--red);font-weight:600}
.urgency-med{color:var(--amber);font-weight:600}
</style>
</head>
<body>
<div id="app"><div class="loading">载入中…</div></div>
<div class="toast" id="toast"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const FB={apiKey:"AIzaSyCL3lP6QmmOAYUS66VUbo5YnWl_xBBivts",authDomain:"vj-account.firebaseapp.com",projectId:"vj-account",storageBucket:"vj-account.firebasestorage.app",messagingSenderId:"274705581918",appId:"1:274705581918:web:7e308a2e1a7fe368e5f1cf"};
const app=initializeApp(FB);const db=getFirestore(app);const auth=getAuth(app);const provider=new GoogleAuthProvider();
const ANTHROPIC_KEY_LS="vj_anthropic_key";
let ANTHROPIC_KEY=localStorage.getItem(ANTHROPIC_KEY_LS)||"";
const MODEL="claude-sonnet-4-6";
const CCY={AUD:{label:"澳币",symbol:"A$"},CNY:{label:"人民币",symbol:"¥"}};
const DEFAULT_TYPES=["签证","学校","职评","雇主","猎头","上诉","咨询","其他"];
const EXPENSE_CATS=["办公租金","工资薪酬","推荐人返佣","营销推广","政府/申请费","差旅","软件订阅","专业服务","其他"];
const INCOME_TYPES=["服务费","佣金","其他"];
const SERVICE_SEED=["签证申请","学校申请","职业评估","雇主担保","猎头服务","上诉/复审","咨询服务","482 SBS","482 NOM","482 VISA","189 独立技术","190 州担保","PR 永居","学生签 500","配偶签 820/801","其他"];
const COURSE_LEVELS=["Higher Education","VET","ELICOS","Foundation","School","Other"];
const COMM_STATUS={awaiting_tuition:{label:"待付学费",color:"#8a90a0"},claimable:{label:"可申请",color:"#C8941E"},claimed:{label:"已申请",color:"#1B2A4A"},received:{label:"已收到",color:"#0E7C7B"},refunded:{label:"已退款",color:"#A14034"}};
const DEFAULT_DATA={clients:[],transactions:[],offers:[],settings:{prefix:"C",nextSeq:1,clientTypes:DEFAULT_TYPES,serviceSeed:SERVICE_SEED,unpaidFollowDays:30}};

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const addMonths=(s,n)=>{if(!s)return null;const d=new Date(s);if(isNaN(d))return null;d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);};
const fmt=(amt,ccy)=>{const s=(CCY[ccy]||{}).symbol||"";return s+Number(amt||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});};
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const daysDiff=(d1,d2)=>Math.round((new Date(d1)-new Date(d2))/(1000*60*60*24));

let S={user:null,data:JSON.parse(JSON.stringify(DEFAULT_DATA)),tab:"dash",year:new Date().getFullYear(),loading:true};

async function loadData(uid){try{const r=await getDoc(doc(db,"users",uid,"data","main"));if(r.exists())return{...DEFAULT_DATA,...r.data(),settings:{...DEFAULT_DATA.settings,...(r.data().settings||{})}};}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_DATA));}
async function saveData(uid,d){try{await setDoc(doc(db,"users",uid,"data","main"),d);}catch(e){}}
function update(mut){if(typeof mut==="function")S.data=mut(JSON.parse(JSON.stringify(S.data)));else S.data=mut;if(S.user)saveData(S.user.uid,S.data);render();}

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show";clearTimeout(t._t);t._t=setTimeout(()=>t.className="toast",2600);}
function confirm2(msg){return new Promise(res=>{const ov=document.createElement("div");ov.className="ov";ov.innerHTML=`<div class="modal" style="max-width:400px"><div class="modal-h"><h3>确认操作</h3></div><div class="modal-b"><p style="font-size:14px;line-height:1.6">${esc(msg)}</p><div class="modal-f"><button class="btn" id="cno">取消</button><button class="btn danger" id="cyes">确定</button></div></div></div>`;document.body.appendChild(ov);ov.querySelector("#cno").onclick=()=>{ov.remove();res(false);};ov.querySelector("#cyes").onclick=()=>{ov.remove();res(true);};});}

function inYear(d,y){if(y==="all")return true;if(!d)return false;return new Date(d).getFullYear()===Number(y);}
function inMonth(d,ym){if(!d)return false;return d.slice(0,7)===ym;}
function thisMonth(){return new Date().toISOString().slice(0,7);}
function lastMonth(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function totalsByCcy(txs,y){const r={AUD:{income:0,expense:0},CNY:{income:0,expense:0}};txs.forEach(t=>{if(!inYear(t.date,y))return;const c=r[t.currency]||r.AUD;if(t.kind==="income")c.income+=Number(t.amount);else c.expense+=Number(t.amount);});return r;}
function monthIncome(txs,ym,ccy){return txs.filter(t=>t.kind==="income"&&t.currency===ccy&&inMonth(t.date,ym)).reduce((s,t)=>s+Number(t.amount),0);}
function clientName(id){const c=S.data.clients.find(c=>c.id===id);return c?`${c.name}（${c.code}）`:"—";}
function buildCommissions(p){
  const ccy=p.currency||"AUD";const rate=Number(p.commissionRate)||0;const out=[];
  const sched=Array.isArray(p.paymentSchedule)?p.paymentSchedule.filter(s=>s&&Number(s.amount)):[];
  if(sched.length>0){sched.forEach((s,i)=>{const b=Number(s.amount)||0;out.push({id:uid(),label:s.label||`第${i+1}期`,basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:s.dueDate||null,status:"awaiting_tuition",note:s.note||""});});}
  else if((p.courseLevel||"").toLowerCase().includes("higher")){const b=Number(p.tuitionTotal)||0;out.push({id:uid(),label:"全额学费佣金",basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:addMonths(p.intakeStartDate,3),status:"awaiting_tuition",note:"开学后3个月可申请"});}
  else{const b=Number(p.tuitionTotal)||0;out.push({id:uid(),label:"学费佣金（待确认）",basisAmount:b,rate,currency:ccy,commissionAmount:+(b*rate/100).toFixed(2),tuitionPaid:false,claimableDate:null,status:"awaiting_tuition",note:"时间不确定"});}
  return out;
}
function getYears(){const s=new Set([new Date().getFullYear()]);S.data.transactions.forEach(t=>s.add(new Date(t.date).getFullYear()));return Array.from(s).sort((a,b)=>b-a);}

/* 收款提醒逻辑：找有收入记录但没有最近付款的客户 */
function getUnpaidClients(){
  const followDays=S.data.settings.unpaidFollowDays||30;
  const todayStr=today();
  // 找所有曾有过「服务费」收入记录，但超过N天没有新收款的客户
  const clientLastPayment={};
  S.data.transactions.forEach(t=>{
    if(t.kind!=="income"||!t.clientId)return;
    if(!clientLastPayment[t.clientId]||t.date>clientLastPayment[t.clientId].date){
      clientLastPayment[t.clientId]={date:t.date,amount:Number(t.amount),currency:t.currency,note:t.note||""};
    }
  });
  // 找有「欠款」标记的记录（notes包含"未付"、"待收"等）
  const unpaidTxs=S.data.transactions.filter(t=>t.kind==="income"&&t.unpaid===true);
  return unpaidTxs.map(t=>{
    const c=S.data.clients.find(x=>x.id===t.clientId);
    const days=daysDiff(todayStr,t.date);
    return{...t,client:c,daysPending:days};
  }).filter(t=>t.client).sort((a,b)=>b.daysPending-a.daysPending);
}

function render(){
  const app=document.getElementById("app");if(!app)return;
  if(S.loading){app.innerHTML=`<div class="loading">载入中…</div>`;return;}
  if(!S.user){app.innerHTML=renderLogin();document.getElementById("btn-login").onclick=async()=>{try{await signInWithPopup(auth,provider);}catch(e){toast("登录失败："+e.message);}};return;}
  app.innerHTML=renderShell();
  document.querySelectorAll(".tab[data-tab]").forEach(b=>{b.onclick=()=>{S.tab=b.dataset.tab;render();};});
  document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth));
  document.getElementById("sel-year")?.addEventListener("change",e=>{S.year=e.target.value==="all"?"all":Number(e.target.value);render();});
}

function renderLogin(){return`<div class="login-wrap"><div class="login-box"><div class="logo-big">VJ</div><h1 style="font-size:22px;font-weight:600;margin-bottom:8px">VJ Consulting & Education</h1><p style="opacity:.7;margin-bottom:28px;line-height:1.6">客户 · 记账 · 佣金 · 分析<br>数据存储在你的 Google 账号，多设备同步</p><button class="btn primary" style="padding:12px 28px;font-size:15px" id="btn-login">🔐 用 Google 账号登录</button></div></div>`;}

function renderShell(){
  const tabs=[["dash","📊 仪表盘"],["clients","👥 客户"],["ledger","📒 记账"],["comm","🎓 Offer/佣金"],["analytics","📈 分析"],["settings","⚙️ 设置"]];
  let content="";
  switch(S.tab){case"dash":content=renderDash();break;case"clients":content=renderClients();break;case"ledger":content=renderLedger();break;case"comm":content=renderComm();break;case"analytics":content=renderAnalytics();break;case"settings":content=renderSettings();break;}

/* ===== 分析（横条图）===== */
function renderAnalytics(){
  const refs=referrerStats();const types=typeRevenue();const svcs=serviceStats();
  const maxRef=Math.max(1,...refs.map(r=>r.AUD));
  const maxType=Math.max(1,...types.map(t=>t.AUD));
  const maxSvc=Math.max(1,...svcs.map(s=>s.count));
  // 月度收入表
  const months=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const monthRows=months.map(m=>({m,AUD:monthIncome(S.data.transactions,m,"AUD"),CNY:monthIncome(S.data.transactions,m,"CNY")}));
  return`<div class="grid2">
<section class="card span2">
  <div class="card-h"><h2>📊 服务项目分布</h2><span class="dim sm">共${svcs.reduce((s,x)=>s+x.count,0)}项</span></div>
  ${svcs.length===0?`<p class="empty">暂无数据，去「客户」页给客户添加服务项目标签</p>`:`<div class="bar-chart">${svcs.map(s=>`<div class="bar-item"><span class="bar-label">${esc(s.name)}</span><div class="bar-track"><div class="bar-fill" style="width:${(s.count/maxSvc*100).toFixed(1)}%;background:linear-gradient(90deg,var(--green),var(--ink))"></div></div><span class="bar-val">${s.count}个</span></div>`).join("")}</div>`}
</section>
<section class="card">
  <div class="card-h"><h2>🏆 推荐人收入排行(AUD)</h2></div>
  ${refs.filter(r=>r.AUD>0).length===0?`<p class="empty">暂无数据</p>`:`<div class="bar-chart">${refs.filter(r=>r.AUD>0).map(r=>`<div class="bar-item"><span class="bar-label">${esc(r.name)}</span><div class="bar-track"><div class="bar-fill" style="width:${(r.AUD/maxRef*100).toFixed(1)}%;background:var(--ink)"></div></div><span class="bar-val">${fmt(r.AUD,"AUD")}</span></div>`).join("")}</div>`}
</section>
<section class="card">
  <div class="card-h"><h2>💼 业务方向收入(AUD)</h2></div>
  ${types.filter(t=>t.AUD>0).length===0?`<p class="empty">暂无数据</p>`:`<div class="bar-chart">${types.filter(t=>t.AUD>0).map(t=>`<div class="bar-item"><span class="bar-label">${esc(t.name)}</span><div class="bar-track"><div class="bar-fill" style="width:${(t.AUD/maxType*100).toFixed(1)}%;background:var(--amber)"></div></div><span class="bar-val">${fmt(t.AUD,"AUD")}</span></div>`).join("")}</div>`}
</section>
<section class="card span2">
  <div class="card-h"><h2>📅 近6个月收入明细</h2></div>
  <table class="tbl mini"><thead><tr><th>月份</th><th class="num">澳币收入</th><th class="num">人民币收入</th></tr></thead>
  <tbody>${monthRows.map(r=>`<tr><td>${r.m}</td><td class="num pos">${r.AUD?fmt(r.AUD,"AUD"):"—"}</td><td class="num" style="color:var(--green)">${r.CNY?fmt(r.CNY,"CNY"):"—"}</td></tr>`).join("")}</tbody></table>
</section>
</div>`;
}
function referrerStats(){const map={};S.data.clients.forEach(c=>{const r=c.referrer||"无推荐人";if(!map[r])map[r]={name:r,clients:0,AUD:0,CNY:0};map[r].clients++;});S.data.transactions.forEach(t=>{if(t.kind!=="income"||!inYear(t.date,S.year))return;const c=S.data.clients.find(c=>c.id===t.clientId);const r=c?(c.referrer||"无推荐人"):"无关联";if(!map[r])map[r]={name:r,clients:0,AUD:0,CNY:0};map[r][t.currency]+=Number(t.amount);});return Object.values(map).sort((a,b)=>b.AUD-a.AUD);}
function typeRevenue(){const map={};S.data.transactions.forEach(t=>{if(t.kind!=="income"||!inYear(t.date,S.year))return;const c=S.data.clients.find(c=>c.id===t.clientId);const type=c?c.type:"未分类";if(!map[type])map[type]={name:type,AUD:0,CNY:0};map[type][t.currency]+=Number(t.amount);});return Object.values(map).sort((a,b)=>b.AUD-a.AUD);}
function serviceStats(){const m={};S.data.clients.forEach(c=>{(c.services||[]).forEach(s=>{m[s]=(m[s]||0)+1;});});return Object.entries(m).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);}

}

/* ===== 全局函数 ===== */
window.setTab=t=>{S.tab=t;render();};
window.rerenderClients=q=>{document.querySelector(".content").innerHTML=renderClients(q);};
window.markPaid=id=>update(d=>{const t=d.transactions.find(x=>x.id===id);if(t)t.unpaid=false;return d;});

window.runAdvice=async()=>{
  const box=document.getElementById("advice-box");if(box)box.innerHTML=`<p class="dim">分析中…</p>`;
  if(!ANTHROPIC_KEY){if(box)box.innerHTML=`<p class="dim">请先在「设置」里填入 API Key</p>`;return;}
  const t=totalsByCcy(S.data.transactions,S.year);
  const refs=referrerStats().slice(0,5);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:"user",content:"你是澳洲移民/留学事务所经营顾问。用简体中文给出4-6条具体可执行建议。直接给要点。\n\n数据:"+JSON.stringify({澳币收入:t.AUD.income,澳币支出:t.AUD.expense,人民币收入:t.CNY.income,客户数:S.data.clients.length,推荐人:refs})}]})});
    const j=await res.json();const txt=(j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    if(box)box.innerHTML=`<div style="font-size:13px;line-height:1.7">${txt.split("\n").map(l=>`<p style="margin-bottom:4px">${esc(l)}</p>`).join("")}</div>`;
  }catch(e){if(box)box.innerHTML=`<p class="dim">生成失败</p>`;}
};

window.addTag=e=>{if(e.key!=="Enter"&&e.key!==",")return;e.preventDefault();const v=e.target.value.trim();if(!v||window._editSvcs.includes(v))return;window._editSvcs.push(v);e.target.value="";const wrap=document.getElementById("tags-wrap");const inp=document.getElementById("tag-inp");const span=document.createElement("span");span.className="tag";span.innerHTML=`${esc(v)}<button onclick="removeTag('${esc(v)}')">×</button>`;wrap.insertBefore(span,inp);};
window.removeTag=v=>{window._editSvcs=window._editSvcs.filter(x=>x!==v);document.getElementById("tags-wrap")?.querySelectorAll(".tag").forEach(el=>{if(el.textContent.replace("×","").trim()===v)el.remove();});};
window.closeClientForm=()=>{const a=document.getElementById("client-form-area");if(a)a.innerHTML="";delete window._editSvcs;};
window.saveClient=id=>{
  const name=document.getElementById("cf-name")?.value?.trim();if(!name){toast("姓名不能为空");return;}
  const c={id:id||uid(),name,type:document.getElementById("cf-type")?.value,referrer:document.getElementById("cf-ref")?.value||"",phone:document.getElementById("cf-phone")?.value||"",email:document.getElementById("cf-email")?.value||"",notes:document.getElementById("cf-notes")?.value||"",services:window._editSvcs||[]};
  update(d=>{if(id){const i=d.clients.findIndex(x=>x.id===id);if(i>=0)d.clients[i]={...d.clients[i],...c};}else{const seq=d.settings.nextSeq;c.code=`${d.settings.prefix}-${String(seq).padStart(4,"0")}`;c.createdAt=today();d.clients.push(c);d.settings.nextSeq=seq+1;}return d;});
  delete window._editSvcs;
};
window.delClient=async id=>{if(await confirm2("删除该客户？"))update(d=>{d.clients=d.clients.filter(x=>x.id!==id);return d;});};

window.importOfferJSON=()=>{

};
window.openOfferForm=(id,draft)=>{
  const o=id?S.data.offers.find(x=>x.id===id):(draft||{id:null,clientId:"",studentName:"",institution:"",course:"",courseLevel:"Higher Education",currency:"AUD",tuitionTotal:"",intakeStartDate:"",commissionRate:"",commissions:[]});

  area.innerHTML=`<div class="ov" onclick="if(event.target===this)closeOfferForm()"><div class="modal wide" onclick="event.stopPropagation()">
  <div class="modal-h"><h3>${id?"编辑Offer":"确认Offer信息"}</h3><button class="icon-btn" onclick="closeOfferForm()">✕</button></div>
  <div class="modal-b">

    <div class="grid2 gap">
      <div class="fld"><span class="fld-l">客户</span><select id="of-client"><option value="">未关联</option>${S.data.clients.map(c=>`<option value="${c.id}"${o.clientId===c.id?" selected":""}>${esc(c.name)}（${esc(c.code)}）</option>`).join("")}</select></div>

window.closeOfferForm=()=>{const a=document.getElementById("offer-form-area");if(a)a.innerHTML="";};
window.saveOffer=id=>{const o={id:id||uid(),clientId:document.getElementById("of-client")?.value||"",studentName:document.getElementById("of-sname")?.value||"",institution:document.getElementById("of-inst")?.value||"",course:document.getElementById("of-course")?.value||"",courseLevel:document.getElementById("of-level")?.value||"Other",currency:document.getElementById("of-ccy")?.value||"AUD",tuitionTotal:Number(document.getElementById("of-tuition")?.value)||0,intakeStartDate:document.getElementById("of-intake")?.value||"",commissionRate:Number(document.getElementById("of-rate")?.value)||0,createdAt:today()};o.commissions=window._offerComms?.length?window._offerComms:buildCommissions(o);update(d=>{if(id){const i=d.offers.findIndex(x=>x.id===id);if(i>=0)d.offers[i]=o;}else d.offers.push(o);return d;});delete window._offerComms;};
window.delOffer=async id=>{if(await confirm2("删除该Offer及佣金记录？"))update(d=>{d.offers=d.offers.filter(x=>x.id!==id);return d;});};
window.parseOffer=async()=>{
  const text=document.getElementById("offer-text")?.value?.trim();if(!text){toast("请先粘贴Offer内容");return;}
  if(!ANTHROPIC_KEY){toast("请先在「设置」里填入 API Key");return;}
  toast("AI识别中…");
  const roster=S.data.clients.map(c=>`${c.code}=${c.name}`).join("；")||"（暂无客户）";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:MODEL,max_tokens:1200,messages:[{role:"user",content:`你是澳洲留学Offer解析助手。只输出JSON，不要任何解释或代码块。字段：{"studentName":string|null,"matchedClientCode":string|null,"institution":string|null,"course":string|null,"courseLevel":"Higher Education"|"VET"|"ELICOS"|"Foundation"|"School"|"Other","currency":"AUD"|"CNY","tuitionTotal":number|null,"intakeStartDate":"YYYY-MM-DD"|null,"paymentSchedule":[{"label":string,"amount":number,"dueDate":"YYYY-MM-DD"|null,"note":string}],"commissionRate":number|null,"needsClarification":boolean,"clarificationQuestions":[string]}\n客户名单：${roster}\n\nOffer内容：\n${text}`}]})});
    const j=await res.json();let txt=(j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();txt=txt.replace(/```json|```/g,"").trim();
    const p=JSON.parse(txt);let matched=null;
    if(p.matchedClientCode)matched=S.data.clients.find(c=>c.code===p.matchedClientCode);
    if(!matched&&p.studentName){const n=p.studentName.replace(/\s/g,"");matched=S.data.clients.find(c=>c.name&&(c.name.includes(n)||n.includes(c.name)));}
    openOfferForm(null,{...p,id:null,clientId:matched?matched.id:"",currency:p.currency==="CNY"?"CNY":"AUD",commissions:buildCommissions(p)});
  }catch(e){toast("识别失败："+e.message);}
};
window.moveComm=async(oid,cid,action)=>{
  if(action==="refund"&&!(await confirm2("确认将这笔佣金标记为退款？")))return;
  update(d=>{const o=d.offers.find(x=>x.id===oid);const c=o?.commissions?.find(x=>x.id===cid);if(!c)return d;
    if(action==="paid"){c.tuitionPaid=true;c.status="claimable";if(!c.claimableDate)c.claimableDate=today();}
    if(action==="claimed")c.status="claimed";
    if(action==="received"){c.status="received";d.transactions.push({id:uid(),clientId:o.clientId,kind:"income",incomeType:"佣金",currency:c.currency,amount:c.commissionAmount,date:today(),note:`佣金·${o.institution}·${c.label}`});}
    if(action==="refund"){const was=c.status==="received";c.status="refunded";if(was)d.transactions.push({id:uid(),clientId:o.clientId,kind:"expense",category:"退款",currency:c.currency,amount:c.commissionAmount,date:today(),note:`佣金退款·${o.institution}`,isRefund:true});}
    return d;});
};

window.exportJSON=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(S.data,null,2)],{type:"application/json"}));a.download=`VJ台账备份_${today()}.json`;a.click();toast("已导出JSON");};
window.exportCSV=()=>{const rows=[["日期","类型","客户","明细","状态","币种","金额"]];S.data.transactions.forEach(t=>{const c=S.data.clients.find(c=>c.id===t.clientId);rows.push([t.date,t.kind==="income"?(t.incomeType||"收入"):(t.category||"支出"),c?c.name:"",(t.note||"").replace(/,/g," "),t.unpaid?"未收款":"已收",t.currency,(t.kind==="income"?"":"-")+t.amount]);});const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"}));a.download=`记账明细_${today()}.csv`;a.click();toast("已导出CSV");};
window.importJSON=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);update({...DEFAULT_DATA,...d});toast("导入成功！");}catch{toast("文件格式错误");}};r.readAsText(f);};
window.clearAll=async()=>{if(await confirm2("确定清空所有数据？此操作不可恢复！"))update(JSON.parse(JSON.stringify(DEFAULT_DATA)));};
window.saveApiKey=()=>{const k=document.getElementById("api-key-input")?.value?.trim();if(k){localStorage.setItem(ANTHROPIC_KEY_LS,k);ANTHROPIC_KEY=k;toast("API Key已保存");}};
